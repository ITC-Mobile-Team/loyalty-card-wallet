appId: com.anonymous.loyaltycardwallet
name: Android bulk import decodes a real fixture and resumes after termination
tags:
  - android
  - phase1
---
- addMedia:
    - "../test/fixtures/barcodes/code128-clear.png"
    - "../test/fixtures/barcodes/unreadable-blank.png"
- launchApp:
    clearState: true
    permissions:
      android.permission.READ_EXTERNAL_STORAGE: allow
      android.permission.READ_MEDIA_IMAGES: allow
- tapOn: "Add card"
- tapOn: "Import Multiple Screenshots"
- tapOn: "Choose Screenshots"
- tapOn:
    id: "com.google.android.documentsui:id/thumbnail"
    index: 0
    optional: true
- tapOn:
    id: "com.google.android.providers.media.module:id/icon_thumbnail"
    index: 0
    optional: true
- tapOn:
    text: "Add"
    optional: true
- tapOn:
    text: "Open"
    optional: true
- assertVisible: "1 of 1 processed"
- pressKey: Home
- killApp
- launchApp:
    stopApp: false
- assertVisible: "1 of 1 processed"
