appId: com.anonymous.loyaltycardwallet
name: Android Near Me permission denial preserves wallet access
tags:
  - android
  - phase4
---
- launchApp:
    clearState: true
    permissions:
      android.permission.ACCESS_COARSE_LOCATION: deny
      android.permission.ACCESS_FINE_LOCATION: deny
- tapOn: "Stores"
- assertVisible: "Near Me"
- assertNotVisible: "Location access is needed for Near Me.*"
- tapOn: "Near Me"
- assertVisible: "Location access is needed for Near Me. City search and saved cards remain available."
- tapOn: "Cards"
- assertVisible: "Add card"
